<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>All Shoes — SOLE.</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

<div class="sale-banner" id="sale-banner">
  <span>⚡ Flash Sale Live</span>
  <span class="discount-badge" id="sale-pct-banner">—% OFF</span>
  <span>Ends in</span>
  <span class="sale-countdown" id="banner-countdown">--:--:--</span>
</div>

<nav class="nav">
  <div class="nav-inner">
    <a href="index.html" class="nav-brand">SOLE<span>.</span></a>
    <div class="nav-links">
      <a href="products.html?gender=women">Women</a>
      <a href="products.html?gender=men">Men</a>
      <a href="products.html" class="active">All Shoes</a>
      <a href="products.html?sale=true" class="sale-link">Sale</a>
    </div>
    <div class="nav-right">
      <a href="orders.html" class="nav-icon-btn" title="My Orders">
        <svg fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2"/><rect x="9" y="3" width="6" height="4" rx="1"/></svg>
      </a>
      <a href="cart.html" class="nav-icon-btn" style="position:relative">
        <svg fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 01-8 0"/></svg>
        <span class="cart-badge" id="cart-badge" style="display:none">0</span>
      </a>
    </div>
  </div>
</nav>

<main class="container page-content">
  <div class="breadcrumb">
    <a href="index.html">Home</a>
    <span class="sep">›</span>
    <span class="current" id="breadcrumb-label">All Shoes</span>
  </div>

  <div class="listing-layout">
    <!-- Sidebar Filters -->
    <aside class="filter-sidebar">
      <div class="filter-title">Filters</div>

      <div class="filter-group">
        <div class="filter-group-label">Gender</div>
        <label class="filter-option"><input type="radio" name="gender" value="" checked> All</label>
        <label class="filter-option"><input type="radio" name="gender" value="men"> Men</label>
        <label class="filter-option"><input type="radio" name="gender" value="women"> Women</label>
        <label class="filter-option"><input type="radio" name="gender" value="unisex"> Unisex</label>
      </div>

      <div class="filter-group">
        <div class="filter-group-label">Brand</div>
        <div id="brand-filters">
          <!-- Injected by JS -->
        </div>
      </div>

      <div class="filter-group">
        <div class="filter-group-label">Size (EU)</div>
        <div style="display:flex;flex-wrap:wrap;gap:6px" id="size-filters">
          <label class="filter-option"><input type="radio" name="size" value=""> All</label>
          <label class="filter-option"><input type="radio" name="size" value="40"> 40</label>
          <label class="filter-option"><input type="radio" name="size" value="41"> 41</label>
          <label class="filter-option"><input type="radio" name="size" value="42"> 42</label>
          <label class="filter-option"><input type="radio" name="size" value="43"> 43</label>
          <label class="filter-option"><input type="radio" name="size" value="44"> 44</label>
          <label class="filter-option"><input type="radio" name="size" value="45"> 45</label>
        </div>
      </div>

      <div class="filter-group">
        <div class="filter-group-label">Price Range ($)</div>
        <div class="price-range-inputs">
          <input type="number" id="min-price" placeholder="Min" min="0">
          <input type="number" id="max-price" placeholder="Max" min="0">
        </div>
      </div>

      <button class="btn btn-primary btn-block mt-16" id="apply-filters">Apply Filters</button>
      <button class="btn btn-ghost btn-block mt-8" id="clear-filters">Clear All</button>
    </aside>

    <!-- Products -->
    <div>
      <div class="section-header">
        <h2 class="section-title" id="page-heading">All Shoes</h2>
        <span class="section-count" id="product-count"></span>
        <select class="form-select" id="sort-select" style="width:auto;margin-left:auto">
          <option value="featured">Featured</option>
          <option value="price_asc">Price: Low to High</option>
          <option value="price_desc">Price: High to Low</option>
          <option value="name">Name A–Z</option>
        </select>
      </div>

      <div class="product-grid" id="product-grid">
        <div class="page-loader" style="grid-column:1/-1">
          <div class="spinner"></div>
        </div>
      </div>
    </div>
  </div>
</main>

<footer style="border-top:1px solid var(--border);padding:24px 0;margin-top:40px">
  <div class="container" style="display:flex;justify-content:space-between;flex-wrap:wrap;gap:8px">
    <span class="nav-brand">SOLE<span>.</span></span>
    <a href="admin.html" class="text-sm text-muted">Admin Panel</a>
  </div>
</footer>

<div id="toast-container"></div>

<script src="js/cart.js"></script>
<script src="js/api.js"></script>
<script src="js/pages/index.js"></script>
<script src="js/pages/products.js"></script>
</body>
</html>
