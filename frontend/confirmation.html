<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Order Confirmed — SOLE.</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

<nav class="nav">
  <div class="nav-inner">
    <a href="index.html" class="nav-brand">SOLE<span>.</span></a>
    <div class="nav-links">
      <a href="products.html">Shop</a>
    </div>
    <div class="nav-right">
      <a href="orders.html" class="nav-icon-btn">
        <svg fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2"/><rect x="9" y="3" width="6" height="4" rx="1"/></svg>
      </a>
      <a href="cart.html" class="nav-icon-btn" style="position:relative">
        <svg fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 01-8 0"/></svg>
        <span class="cart-badge" id="cart-badge" style="display:none">0</span>
      </a>
    </div>
  </div>
</nav>

<main class="container page-content">
  <div class="page-loader" id="loader"><div class="spinner"></div></div>

  <div class="hidden" id="confirmation-content">
    <div class="confirmation-card">
      <div class="check-circle">✓</div>
      <h1 style="font-family:var(--font-display);font-size:2.2rem;margin-bottom:8px">Order Confirmed!</h1>
      <p class="text-muted" style="font-size:15px;margin-bottom:28px">
        Thank you for your purchase. We'll start processing your order right away.
      </p>

      <div style="background:var(--bg);border-radius:var(--radius-md);
                  padding:16px 20px;margin-bottom:24px;text-align:left">
        <div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px">
          <div>
            <div class="text-sm text-muted">Order ID</div>
            <div style="font-family:var(--font-display);font-size:1.3rem;font-weight:600" id="conf-order-id"></div>
          </div>
          <div id="conf-status-badge"></div>
        </div>
        <hr class="divider" style="margin:14px 0">
        <div style="display:flex;justify-content:space-between;font-size:14px;color:var(--text-secondary)">
          <span>Placed on</span>
          <span id="conf-date"></span>
        </div>
        <div style="display:flex;justify-content:space-between;font-size:14px;color:var(--text-secondary);margin-top:6px">
          <span>Ship to</span>
          <span id="conf-address" style="text-align:right;max-width:200px"></span>
        </div>
      </div>

      <!-- Items -->
      <div style="text-align:left;margin-bottom:24px">
        <div class="section-label" style="margin-bottom:12px">Items Ordered</div>
        <div id="conf-items"></div>
      </div>

      <!-- Total -->
      <div style="background:var(--black);color:var(--white);border-radius:var(--radius-md);
                  padding:16px 20px;display:flex;justify-content:space-between;align-items:center;
                  margin-bottom:28px">
        <span style="font-size:14px">Total Paid</span>
        <span style="font-family:var(--font-display);font-size:1.6rem;font-weight:600" id="conf-total"></span>
      </div>

      <div style="display:flex;gap:12px;justify-content:center;flex-wrap:wrap">
        <a href="orders.html" class="btn btn-primary">View My Orders</a>
        <a href="products.html" class="btn btn-outline">Continue Shopping</a>
      </div>
    </div>
  </div>
</main>

<div id="toast-container"></div>

<script src="js/cart.js"></script>
<script src="js/api.js"></script>
<script src="js/pages/confirmation.js"></script>
</body>
</html>
