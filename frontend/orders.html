<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Orders — SOLE.</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

<nav class="nav">
  <div class="nav-inner">
    <a href="index.html" class="nav-brand">SOLE<span>.</span></a>
    <div class="nav-links">
      <a href="products.html?gender=women">Women</a>
      <a href="products.html?gender=men">Men</a>
      <a href="products.html">All Shoes</a>
      <a href="products.html?sale=true" class="sale-link">Sale</a>
    </div>
    <div class="nav-right">
      <a href="orders.html" class="nav-icon-btn active">
        <svg fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2"/><rect x="9" y="3" width="6" height="4" rx="1"/></svg>
      </a>
      <a href="cart.html" class="nav-icon-btn" style="position:relative">
        <svg fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 01-8 0"/></svg>
        <span class="cart-badge" id="cart-badge" style="display:none">0</span>
      </a>
    </div>
  </div>
</nav>

<main class="container page-content">
  <div class="breadcrumb">
    <a href="index.html">Home</a>
    <span class="sep">›</span>
    <span class="current">My Orders</span>
  </div>

  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:32px;flex-wrap:wrap;gap:12px">
    <h1 style="font-family:var(--font-display);font-size:2rem">My Orders</h1>
    <span class="badge badge-neutral" id="order-count-badge">Loading…</span>
  </div>

  <!-- Status filter tabs -->
  <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:24px" id="status-tabs">
    <button class="btn btn-primary btn-sm active-tab" data-status="">All</button>
    <button class="btn btn-ghost btn-sm" data-status="confirmed">Confirmed</button>
    <button class="btn btn-ghost btn-sm" data-status="shipped">Shipped</button>
    <button class="btn btn-ghost btn-sm" data-status="delivered">Delivered</button>
    <button class="btn btn-ghost btn-sm" data-status="cancelled">Cancelled</button>
  </div>

  <div class="page-loader" id="loader"><div class="spinner"></div></div>

  <div class="hidden" id="orders-list"></div>

  <div class="empty-state hidden" id="empty-state">
    <div class="empty-state-icon">📦</div>
    <h3>No orders yet</h3>
    <p>Your orders will appear here once you make a purchase.</p>
    <a href="products.html" class="btn btn-primary mt-16">Shop Now</a>
  </div>
</main>

<footer style="border-top:1px solid var(--border);padding:24px 0;margin-top:40px">
  <div class="container" style="display:flex;justify-content:space-between;flex-wrap:wrap;gap:8px">
    <span class="nav-brand">SOLE<span>.</span></span>
    <a href="admin.html" class="text-sm text-muted">Admin Panel</a>
  </div>
</footer>

<div id="toast-container"></div>

<script src="js/cart.js"></script>
<script src="js/api.js"></script>
<script src="js/pages/orders.js"></script>
</body>
</html>
